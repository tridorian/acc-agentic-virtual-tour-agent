<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Learners AI</title>
    <link rel="icon" type="image/jpeg" href="https://scontent.fkul8-4.fna.fbcdn.net/v/t39.30808-6/409800028_768338051973763_4459650912449556577_n.jpg?_nc_cat=100&ccb=1-7&_nc_sid=1d70fc&_nc_ohc=hKl1gkCFTEgQ7kNvwFsvSc8&_nc_oc=Adn0w4eddRC6_piLZQKZuZQW3vEO4pO9v9HhxipBuFATDHzyalLq6j6W9w5Ok5u_SDf5Qzaw5TRPBSN_DptGAnyJ&_nc_zt=23&_nc_ht=scontent.fkul8-4.fna&_nc_gid=raQhUqA4zn6Mwq-6Qhp6Bg&_nc_ss=8&oh=00_AfwvmNpG-rHvMLEFgLogaHNLKc0d5dKhxou-_GWqM4iZxg&oe=69AD0176">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Readex+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/app.js" type="module"></script>
  </head>

  <body>
    <!-- User Information Collection Modal -->
    <div id="userInfoModal" class="modal user-info-modal">
      <div class="modal-content user-info-content">
        <div class="modal-header">
          <h2>Welcome! Please provide your information</h2>
        </div>
        <form id="userInfoForm" class="user-info-form">
          <div class="form-group">
            <label for="fullName">Full Name <span class="required">*</span></label>
            <input type="text" id="fullName" name="fullName" required>
          </div>
          <div class="form-group">
            <label for="identificationNo">Identification No. <span class="required">*</span></label>
            <input type="text" id="identificationNo" name="identificationNo" required>
          </div>
          <div class="form-group">
            <label>Phone Number <span class="required">*</span></label>
            <div class="phone-input-group">
              <div class="custom-select-wrapper">
                <input 
                  type="text" 
                  id="countryCodeInput" 
                  class="custom-select-input" 
                  placeholder="Search country..."
                  autocomplete="off"
                  required
                >
                <div id="countryCodeDropdown" class="custom-select-dropdown"></div>
              </div>
              <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="Enter phone number" required>
              <input type="hidden" id="countryCode" name="countryCode" required>
            </div>
          </div>
          <div class="form-group">
            <label for="emailAddress">Email Address <span class="required">*</span></label>
            <input type="email" id="emailAddress" name="emailAddress" required>
          </div>
          <button type="submit" id="submitUserInfo" class="btn-submit">Start Chat</button>
        </form>
      </div>
    </div>

    <header>
      <h1>Star Learners AI</h1>
      <div class="subtitle">Your guide to Star Learners — ask Stella anything</div>
      <div class="header-manage">
        <button type="button" id="openConsoleButton" class="manage-link console-toggle-btn">Event Console</button>
      </div>
      <div class="connection-status">
        <span class="status-indicator" id="statusIndicator"></span>
        <span id="statusText">Connecting...</span>
      </div>
    </header>

    <div class="main-layout">
      <div class="video-panel">
        <div id="videoStage" class="video-stage">
          <div class="video-placeholder">Virtual tour will begin shortly.</div>
        </div>
      </div>

      <div class="container">
        <div id="messages"></div>

        <div class="input-container">
          <div class="input-wrapper">
            <!-- Shown before session starts -->
            <button type="button" id="startSessionButton" class="btn-start-session">Start Chat with Stella</button>
            <!-- Shown after session starts -->
            <div id="chatInputRow" class="chat-input-row hidden">
              <div class="text-input-wrapper">
                <div class="input-mode-bar">
                  <textarea
                    id="textInput"
                    class="text-input"
                    placeholder="Ask anything"
                    rows="1"
                    maxlength="1000"
                  ></textarea>
                  <button type="button" id="startAudioButton" class="voice-pill-btn" title="Toggle full voice mode" aria-pressed="false">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20" aria-hidden="true">
                      <path d="M6.5 7a1 1 0 0 1 1 1v8a1 1 0 1 1-2 0V8a1 1 0 0 1 1-1zm5-3a1 1 0 0 1 1 1v14a1 1 0 1 1-2 0V5a1 1 0 0 1 1-1zm5 4a1 1 0 0 1 1 1v6a1 1 0 1 1-2 0V9a1 1 0 0 1 1-1z"/>
                    </svg>
                    <span>Voice</span>
                  </button>
                </div>
              </div>
            </div>
            <button type="button" id="endConversationButton" class="hidden" disabled>End Conversation</button>
          </div>
        </div>
      </div>

      <div class="console-panel console-popup hidden-popup" id="consolePopup">
        <div class="console-header">
          <h2>Event Console</h2>
          <div class="console-controls">
            <label class="console-checkbox">
              <input type="checkbox" id="showAudioEvents">
              <span>Show audio</span>
            </label>
            <button id="clearConsole" class="console-clear-btn">Clear</button>
            <button id="closeConsoleButton" class="console-clear-btn">Close</button>
          </div>
        </div>
        <div id="consoleContent" class="console-content"></div>
      </div>
    </div>

    <div id="endConversationModal" class="modal">
      <div class="modal-content end-summary-content">
        <div class="modal-header">
          <h3>Conversation Summary</h3>
          <button type="button" class="close-btn" id="closeEndConversationModal" aria-label="Close">&times;</button>
        </div>
        <div class="modal-body end-summary-body">
          <div class="summary-row"><strong>Session ID:</strong> <span id="summarySessionId">-</span></div>
          <div class="summary-row"><strong>Name:</strong> <span id="summaryUserName">-</span></div>
          <div class="summary-row"><strong>Email:</strong> <span id="summaryUserEmail">-</span></div>
          <div class="summary-row"><strong>Duration:</strong> <span id="summaryDuration">00:00:00</span></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-primary" id="closeSummaryButton">Done</button>
        </div>
      </div>
    </div>

  </body>
</html>
