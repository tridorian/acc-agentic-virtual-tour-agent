<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADK Gemini Live API Toolkit Demo</title>
    <link rel="icon" type="image/jpeg" href="https://scontent.fkul8-4.fna.fbcdn.net/v/t39.30808-6/409800028_768338051973763_4459650912449556577_n.jpg?_nc_cat=100&ccb=1-7&_nc_sid=1d70fc&_nc_ohc=hKl1gkCFTEgQ7kNvwFsvSc8&_nc_oc=Adn0w4eddRC6_piLZQKZuZQW3vEO4pO9v9HhxipBuFATDHzyalLq6j6W9w5Ok5u_SDf5Qzaw5TRPBSN_DptGAnyJ&_nc_zt=23&_nc_ht=scontent.fkul8-4.fna&_nc_gid=raQhUqA4zn6Mwq-6Qhp6Bg&_nc_ss=8&oh=00_AfwvmNpG-rHvMLEFgLogaHNLKc0d5dKhxou-_GWqM4iZxg&oe=69AD0176">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/app.js" type="module"></script>
  </head>

  <body>
    <!-- User Information Collection Modal -->
    <div id="userInfoModal" class="modal user-info-modal">
      <div class="modal-content user-info-content">
        <div class="modal-header">
          <h2>Welcome! Please provide your information</h2>
        </div>
        <form id="userInfoForm" class="user-info-form">
          <div class="form-group">
            <label for="fullName">Full Name <span class="required">*</span></label>
            <input type="text" id="fullName" name="fullName" required>
          </div>
          <div class="form-group">
            <label for="identificationNo">Identification No. <span class="required">*</span></label>
            <input type="text" id="identificationNo" name="identificationNo" required>
          </div>
          <div class="form-group">
            <label>Phone Number <span class="required">*</span></label>
            <div class="phone-input-group">
              <div class="custom-select-wrapper">
                <input 
                  type="text" 
                  id="countryCodeInput" 
                  class="custom-select-input" 
                  placeholder="Search country..."
                  autocomplete="off"
                  required
                >
                <div id="countryCodeDropdown" class="custom-select-dropdown"></div>
              </div>
              <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="Enter phone number" required>
              <input type="hidden" id="countryCode" name="countryCode" required>
            </div>
          </div>
          <div class="form-group">
            <label for="emailAddress">Email Address <span class="required">*</span></label>
            <input type="email" id="emailAddress" name="emailAddress" required>
          </div>
          <button type="submit" id="submitUserInfo" class="btn-submit">Start Chat</button>
        </form>
      </div>
    </div>

    <header>
      <h1>ADK Gemini Live API Toolkit Demo</h1>
      <div class="subtitle">Real-time bidirectional streaming with Google ADK</div>
      <div class="header-options">
        <label class="header-checkbox" title="Enable model to proactively respond without explicit prompts (Native audio models only)">
          <input type="checkbox" id="enableProactivity">
          <span>Proactivity</span>
        </label>
        <label class="header-checkbox" title="Enable model to detect and adapt to emotional cues (Native audio models only)">
          <input type="checkbox" id="enableAffectiveDialog">
          <span>Affective Dialog</span>
        </label>
      </div>
      <!-- link to the separate knowledge-base management page -->
      <div class="header-manage">
        <a href="/static/kb.html" class="manage-link">Manage Knowledge Base</a>
      </div>
      <div class="connection-status">
        <span class="status-indicator" id="statusIndicator"></span>
        <span id="statusText">Connecting...</span>
      </div>
    </header>

    <div class="main-layout">
      <div class="container">
        <div id="messages"></div>

        <div class="input-container">
          <div class="input-wrapper">
            <button type="button" id="startAudioButton">Start Interacting</button>
          </div>
        </div>
      </div>

      <div class="console-panel">
        <div class="console-header">
          <h2>Event Console</h2>
          <div class="console-controls">
            <label class="console-checkbox">
              <input type="checkbox" id="showAudioEvents">
              <span>Show audio</span>
            </label>
            <button id="clearConsole" class="console-clear-btn">Clear</button>
          </div>
        </div>
        <div id="consoleContent" class="console-content"></div>
      </div>
    </div>

  </body>
</html>
